name: Backend CI/CD

# CI on every push/PR that touches the backend; CD (deploy to the Lightsail box)
# only on a green push to main.
#
# Required repo secrets for the deploy job (CI runs without them):
#   LIGHTSAIL_SSH_KEY  – contents of deploy/lightsail/reins-key.pem (the deploy key)
#   LIGHTSAIL_HOST     – the box's public IP (e.g. 3.230.90.52)
# Without those, the deploy job no-ops with a notice. The box's existing
# /home/ubuntu/reins/.env is reused (CI never needs the prod env), and ship.sh
# takes a verified DB backup before it rebuilds.

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "cli/**"
      - "deploy/**"
      - "docker-compose.yml"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "server/**"
      - "cli/**"
      - "deploy/**"
      - "docker-compose.yml"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install server deps
        working-directory: server
        run: npm ci
      - name: Typecheck server
        working-directory: server
        run: npx tsc --noEmit
      - name: Server tests
        working-directory: server
        run: npm test
      - name: CLI tests
        working-directory: cli
        run: node --test --test-force-exit 'test/**/*.test.mjs'

  deploy:
    name: Deploy to Lightsail
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: backend-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Gate on deploy secrets
        id: gate
        env:
          SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          HOST: ${{ secrets.LIGHTSAIL_HOST }}
        run: |
          if [ -z "$SSH_KEY" ] || [ -z "$HOST" ]; then
            echo "::notice::LIGHTSAIL_SSH_KEY / LIGHTSAIL_HOST not set — skipping deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Write deploy key
        if: steps.gate.outputs.skip != 'true'
        env:
          SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
        run: |
          printf '%s\n' "$SSH_KEY" > deploy/lightsail/reins-key.pem
          chmod 600 deploy/lightsail/reins-key.pem
      - name: Ship (backup + rsync + build + health check)
        if: steps.gate.outputs.skip != 'true'
        run: bash deploy/lightsail/ship.sh "${{ secrets.LIGHTSAIL_HOST }}"
      - name: Clean up key
        if: always()
        run: rm -f deploy/lightsail/reins-key.pem
