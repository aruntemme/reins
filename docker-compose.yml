# Self-host Reins (server + SQLite volume). Good for a single EC2/Lightsail box.
# The Next.js dashboard deploys separately to Vercel (see deploy/DEPLOY.md).
services:
  reins:
    build: ./server
    restart: unless-stopped
    ports:
      - "4319:4319"
    environment:
      REINS_AUTH: "on"
      REINS_SESSION_SECRET: "${REINS_SESSION_SECRET:?set a long random secret}"
      REINS_COOKIE_SECURE: "on"
      REINS_DB: "/data/reins.db" # persist SQLite on the volume across rebuilds
      REINS_CORS_ORIGIN: "${REINS_CORS_ORIGIN}" # your Vercel dashboard origin
      # Master key for encrypting stored provider API keys at rest (AES-256-GCM).
      # Set a long random value; otherwise the server generates one into /data/.reins-secret.
      REINS_SECRET_KEY: "${REINS_SECRET_KEY:-}"
      # Model providers are normally configured in the dashboard (Settings → model
      # providers; encrypted in the DB). These env vars are an optional fallback
      # used only until a provider is added there.
      REINS_LLM_MODEL: "${REINS_LLM_MODEL:-}"
      REINS_LLM_BASE_URL: "${REINS_LLM_BASE_URL:-}"
      REINS_LLM_API_KEY: "${REINS_LLM_API_KEY:-}"
    volumes:
      - reins-data:/data

volumes:
  reins-data:
