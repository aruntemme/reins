# Self-host Reins (server + SQLite volume). Good for a single EC2/Lightsail box.
# The Next.js dashboard deploys separately to Vercel (see deploy/DEPLOY.md).
services:
  reins:
    build: ./server
    restart: unless-stopped
    ports:
      - "4319:4319"
    environment:
      REINS_AUTH: "on"
      REINS_SESSION_SECRET: "${REINS_SESSION_SECRET:?set a long random secret}"
      REINS_COOKIE_SECURE: "on"
      REINS_DB: "/data/reins.db" # persist SQLite on the volume across rebuilds
      REINS_CORS_ORIGIN: "${REINS_CORS_ORIGIN}" # your Vercel dashboard origin
      # Inference backend: 0g-router | openai | 0g
      REINS_LLM_PROVIDER: "${REINS_LLM_PROVIDER:-openai}"
      REINS_LLM_MODEL: "${REINS_LLM_MODEL}"
      # 0G Compute (0G Private Computer router)
      OG_ROUTER_API_KEY: "${OG_ROUTER_API_KEY:-}"
      OG_ROUTER_BASE_URL: "${OG_ROUTER_BASE_URL:-}"
      OG_PRIVATE: "${OG_PRIVATE:-off}"
      # 0G Storage
      OG_STORAGE: "${OG_STORAGE:-off}"
      OG_PRIVATE_KEY: "${OG_PRIVATE_KEY:-}"
      OG_RPC_URL: "${OG_RPC_URL:-}"
      OG_STORAGE_INDEXER: "${OG_STORAGE_INDEXER:-}"
      # OpenAI-compatible fallback (used only when REINS_LLM_PROVIDER=openai)
      REINS_LLM_BASE_URL: "${REINS_LLM_BASE_URL}"
      REINS_LLM_API_KEY: "${REINS_LLM_API_KEY}"
    volumes:
      - reins-data:/data

volumes:
  reins-data:
